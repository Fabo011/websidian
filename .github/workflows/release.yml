# GitHub Actions pipeline.
#
# On every push to `main` this will:
#   1. Build the project and run the test suite.
#   2. Derive a version, create and push a git tag.
#   3. Build a multi-arch Docker image (linux/amd64 + linux/arm64) so it runs on
#      x86_64 servers (e.g. Ubuntu 26.04 x86_64) as well as ARM (Raspberry Pi)
#      and push it to the GitHub Container Registry (ghcr.io).
#
# Requirements:
#   - No extra secrets are needed. The built-in GITHUB_TOKEN is used to push the
#     git tag and to log in / push to ghcr.io. Make sure that under
#     Repo > Settings > Actions > General > "Workflow permissions" the option
#     "Read and write permissions" is enabled.

name: build-and-release

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # Image repository: ghcr.io/<owner>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-project:
    runs-on: ubuntu-latest
    container:
      image: node:24-bookworm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build client + server
        run: npm run build:all

      - name: Run tests
        run: npm test --if-present

  release:
    needs: build-project
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version tag
        id: version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +%Y%m%d)
          TAG="v${PKG_VERSION}-${DATE}.${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"

      - name: Create and push git tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping."
          else
            git tag -a "$TAG" -m "Automated release $TAG"
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "$TAG"
          fi

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image name
        id: image
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64 #linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.tag }}
          provenance: false
