# Minimal docker-compose for self-hoster
services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    
  websidian:
    image: ghcr.io/fabo011/websidian:latest
    container_name: websidian
    restart: unless-stopped
    ports:
      - "3065:3065"
    environment:
      USER_STORAGE_ENABLED: "true"
      ALLOW_REGISTRATION: "${ALLOW_REGISTRATION:-true}" # Change to false after you and your friends have registered to prevent random people from registering
      PORT: 3065
      ENCRYPTION_ENABLED: "${ENCRYPTION_ENABLED:-true}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-7d}"
      JWT_SECRET: "${JWT_SECRET}"
      APP_URL: "${APP_URL}" # Frontend url, your domain
      CONTACT_EMAIL: "${CONTACT_EMAIL}" # You email
      CORS_ORIGINS: "${CORS_ORIGINS}" # Frontend url, your domain
      DB_TYPE: "${DB_TYPE:-postgres}"
      DB_HOST: "${DB_HOST:-localhost}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_USERNAME: "${DB_USERNAME:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      DB_DATABASE: "${DB_DATABASE:-web_obsidian}"
      DB_SSL: "${DB_SSL:-false}"
      TRASH_RETENTION_DAYS: "${TRASH_RETENTION_DAYS:-7}"
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-true}"
      RATE_LIMIT_WINDOW_SECONDS: "${RATE_LIMIT_WINDOW_SECONDS:-60}"
      RATE_LIMIT_MAX: "${RATE_LIMIT_MAX:-500}"
      VAULT_TREE_CACHE_SECONDS: "${VAULT_TREE_CACHE_SECONDS:-30}"
      MAX_UPLOAD_SIZE_MB: "${MAX_UPLOAD_SIZE_MB:-100}"
      IMPRINT: "${IMPRINT:-false}"
      AGB: "${AGB:-false}"
      LEGAL_NOTICE: "${LEGAL_NOTICE:-false}"
      MAX_UPLOAD_FILE_MB: "${MAX_UPLOAD_FILE_MB:-200}"
      MAX_IMPORT_FILES: "${MAX_IMPORT_FILES:-20000}"
      MAX_IMPORT_TOTAL_MB: "${MAX_IMPORT_TOTAL_MB:-200}"
      UPLOAD_REQUEST_TIMEOUT_MIN: "${UPLOAD_REQUEST_TIMEOUT_MIN:-15}"
      SEARCH_CACHE_TTL_MS: "${SEARCH_CACHE_TTL_MS:-15000}"
      RATE_LIMIT_DASH_ENABLED: "${RATE_LIMIT_DASH_ENABLED:-true}"
      RATE_LIMIT_DASH_WINDOW_SECONDS: "${RATE_LIMIT_DASH_WINDOW_SECONDS:-60}"
      RATE_LIMIT_DASH_MAX: "${RATE_LIMIT_DASH_MAX:-50000000}"
      UPLOAD_EXCLUDE_PATTERNS: "${UPLOAD_EXCLUDE_PATTERNS}"
      MAX_OPEN_TABS: "${MAX_OPEN_TABS:-8}"
    depends_on:
      - cloudflared
      - postgres

  postgres:
    image: postgres:18-alpine
    container_name: websidian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_DATABASE}"
    volumes:
      - postgres-data:/var/lib/postgresql
    depends_on:
      - cloudflared

volumes:
  postgres-data:
