services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    
  websidian:
    image: ghcr.io/fabo011/websidian:latest
    container_name: websidian
    restart: unless-stopped
    ports:
      - "3065:3065"
    environment:
      # Basic
      ALLOW_REGISTRATION: "${ALLOW_REGISTRATION}"
      PORT: 3065
      COOKIE_SECURE: "${COOKIE_SECURE:-true}"
      CORS_ORIGINS: "${CORS_ORIGINS}"
      TRASH_RETENTION_DAYS: "${TRASH_RETENTION_DAYS}"
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-true}"
      RATE_LIMIT_WINDOW_SECONDS: "${RATE_LIMIT_WINDOW_SECONDS:-60}"
      RATE_LIMIT_MAX_REQUESTS: "${RATE_LIMIT_MAX_REQUESTS:-200}"
      VAULT_TREE_CACHE_SECONDS: "${VAULT_TREE_CACHE_SECONDS}"
      MAX_REGISTRATIONS: "${MAX_REGISTRATIONS}"
      MAX_UPLOAD_SIZE_MB: "${MAX_UPLOAD_SIZE_MB:-20}"
      MAX_UPLOAD_FILE_MB: "${MAX_UPLOAD_FILE_MB:-2048}"
      MAX_IMPORT_FILES: "${MAX_IMPORT_FILES:-20000}"
      MAX_IMPORT_TOTAL_MB: "${MAX_IMPORT_TOTAL_MB:-2048}"
      UPLOAD_REQUEST_TIMEOUT_MIN: "${UPLOAD_REQUEST_TIMEOUT_MIN:-30}"
      # S3 Storage
      STORAGE_QUOTA_GB: "${STORAGE_QUOTA_GB}"
      STORAGE_DRIVER: "${STORAGE_DRIVER}"
      S3_ENDPOINT: "${S3_ENDPOINT}"
      S3_REGION: "${S3_REGION}"
      S3_BUCKET: "${S3_BUCKET}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY}"
      S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE:-true}"
      S3_PREFIX: "${S3_PREFIX}"
      # JWT
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRES_IN: "7d"
      # Postgres
      ENCRYPTION_ENABLED: "${ENCRYPTION_ENABLED:-true}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      DATA_ROOT: "/app/data"
      DB_TYPE: "${DB_TYPE}"
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_DATABASE: "${DB_DATABASE}"
      DB_SSL: "${DB_SSL}"
      # Stripe Billing
      BILLING_ENABLED: "${BILLING_ENABLED}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
      STRIPE_PRICE_5GB: "${STRIPE_PRICE_5GB}"
      STRIPE_PRICE_20GB: "${STRIPE_PRICE_20GB}"
      APP_URL: "${APP_URL}"
      PRICE_5GB: "${PRICE_5GB}"
      PRICE_20GB: "${PRICE_20GB}"
      CONTACT_EMAIL: "${CONTACT_EMAIL}"
      AGB: "${AGB}"
      # 
    depends_on:
      - cloudflared
      - postgres

  postgres:
    image: postgres:18-alpine
    container_name: websidian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_DATABASE}"
    volumes:
      - postgres-data:/var/lib/postgresql
    depends_on:
      - cloudflared

volumes:
  postgres-data:
