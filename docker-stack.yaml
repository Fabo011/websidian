networks:
  websidian-net:
    driver: overlay
    attachable: true

volumes:
  postgres-data:
    external: true
    name: server_postgres-data

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    networks:
      - websidian-net
    deploy:
      replicas: 2
      restart_policy:
        condition: any

  websidian:
    image: ghcr.io/fabo011/websidian:latest
    networks:
      - websidian-net
    ports:
      - target: 3065
        published: 3065
        protocol: tcp
        mode: host
    environment:
      USER_STORAGE_ENABLED: "true"
      ALLOW_REGISTRATION: "${ALLOW_REGISTRATION:-true}"
      PORT: 3065
      ENCRYPTION_ENABLED: "${ENCRYPTION_ENABLED:-true}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-7d}"
      JWT_SECRET: "${JWT_SECRET}"
      APP_URL: "${APP_URL}"
      CONTACT_EMAIL: "${CONTACT_EMAIL}"
      DONATION_LINK: "${DONATION_LINK}"
      CORS_ORIGINS: "${CORS_ORIGINS}"
      DB_TYPE: "${DB_TYPE:-postgres}"
      DB_HOST: "${DB_HOST:-localhost}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_USERNAME: "${DB_USERNAME:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      DB_DATABASE: "${DB_DATABASE:-web_obsidian}"
      DB_SSL: "${DB_SSL:-false}"
      TRASH_RETENTION_DAYS: "${TRASH_RETENTION_DAYS}"
      RATE_LIMIT_ENABLED: "${RATE_LIMIT_ENABLED:-true}"
      RATE_LIMIT_WINDOW_SECONDS: "${RATE_LIMIT_WINDOW_SECONDS}"
      RATE_LIMIT_MAX: "${RATE_LIMIT_MAX}"
      VAULT_TREE_CACHE_SECONDS: "${VAULT_TREE_CACHE_SECONDS}"
      MAX_UPLOAD_SIZE_MB: "${MAX_UPLOAD_SIZE_MB}"
      IMPRINT: "${IMPRINT:-true}"
      MAX_UPLOAD_FILE_MB: "${MAX_UPLOAD_FILE_MB:-200}"
      MAX_IMPORT_FILES: "${MAX_IMPORT_FILES:-20000}"
      MAX_IMPORT_TOTAL_MB: "${MAX_IMPORT_TOTAL_MB:-200}"
      UPLOAD_REQUEST_TIMEOUT_MIN: "${UPLOAD_REQUEST_TIMEOUT_MIN:-15}"
      SEARCH_CACHE_TTL_MS: "${SEARCH_CACHE_TTL_MS:-15000}"
      RATE_LIMIT_DASH_ENABLED: "${RATE_LIMIT_DASH_ENABLED:-true}"
      RATE_LIMIT_DASH_WINDOW_SECONDS: "${RATE_LIMIT_DASH_WINDOW_SECONDS:-60}"
      RATE_LIMIT_DASH_MAX: "${RATE_LIMIT_DASH_MAX:-50000000}"
      UPLOAD_EXCLUDE_PATTERNS: "${UPLOAD_EXCLUDE_PATTERNS}"
      MAX_OPEN_TABS: "${MAX_OPEN_TABS:-8}"
    deploy:
      replicas: 2
      endpoint_mode: dnsrr
      restart_policy:
        condition: any

  postgres:
    image: postgres:18-alpine
    command: postgres -c unix_socket_directories=''
    networks:
      - websidian-net
    environment:
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: "${DB_DATABASE}"
    volumes:
      - postgres-data:/var/lib/postgresql
    deploy:
      replicas: 1
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any